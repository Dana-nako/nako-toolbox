<!doctype html>
<html lang="ja" data-theme="black-gold">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101114">
  <meta name="description" content="ダナがなこのために作った小道具をまとめた個人用ツール箱。">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="assets/css/app.css">
  <title>なこ用ツール箱</title>
</head>
<body>
  <div class="app">
<section class="dashboard-view" id="view-dashboard">
  <div class="dashboard-hero-shell">
    <div class="dashboard-art" aria-hidden="true"></div>
    <div class="dashboard-overlay" aria-hidden="true"></div>

    <header class="dashboard-copy">
      <p class="section-label">DANA MADE</p>
      <h1>なこ用ツール箱</h1>
      <p class="lead">細かなテキスト作業を、もっとラクに。</p>
    </header>
  </div>

  <main class="dashboard-tools">
    <a class="tool-card hero-tool-card" href="name-replacer.html">
      <div class="tool-card-icon tool-card-icon--name" aria-hidden="true">A⇄B</div>
      <div class="tool-card-copy">
        <h2>名前置換メーカー</h2>
        <p>指定した名前へ、まとめて差し替える。</p>
      </div>
      <span class="tool-card-arrow" aria-hidden="true">›</span>
    </a>

    <a class="tool-card hero-tool-card" href="word-replacer.html">
      <div class="tool-card-icon tool-card-icon--word" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <path d="M21 47L12.5 51L15.5 42C11.8 38.8 9.5 34.1 9.5 29C9.5 18.8 18.9 11 31 11C40 11 47.8 15.3 51 21.5" stroke="#f2c14e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 25H37" stroke="#f2c14e" stroke-width="4" stroke-linecap="round"/>
          <path d="M22 33H33" stroke="#f2c14e" stroke-width="4" stroke-linecap="round"/>
          <path d="M49.5 13.5L51.3 17.8L55.5 19.5L51.3 21.3L49.5 25.5L47.8 21.3L43.5 19.5L47.8 17.8L49.5 13.5Z" fill="#f2c14e"/>
        </svg>
      </div>
      <div class="tool-card-copy">
        <h2>ワード変換メーカー</h2>
        <p>語彙や表現を、用途に合わせて差し替える。</p>
      </div>
      <span class="tool-card-arrow" aria-hidden="true">›</span>
    </a>
  </main>
</section>
  </div>
  <script type="module" src="assets/js/dashboard.js"></script>
</body>
</html>
