<!doctype html>
<html lang="ja"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><title>なこ用ツール箱</title><link rel="manifest" href="./manifest.json"/><meta name="theme-color" content="#101114"/><style>
:root{--bg:#101114;--panel:#181a20;--text:#f2f0e8;--muted:#aaa49a;--line:#353845;--gold:#d4af37;--gold2:#f2c14e;--radius:20px;--shadow:0 18px 40px rgba(0,0,0,.35);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0%,rgba(212,175,55,.18),transparent 28rem),radial-gradient(circle at 95% 10%,rgba(242,193,78,.08),transparent 24rem),var(--bg);color:var(--text);padding:20px;line-height:1.7}.app{width:min(860px,100%);margin:0 auto}header{padding:18px 8px 8px}h1{font-size:clamp(1.7rem,6vw,2.6rem);line-height:1.1;margin:0 0 10px}.lead{color:var(--muted);margin:0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}@media(max-width:620px){body{padding:12px}.grid{grid-template-columns:1fr}}.card{display:block;text-decoration:none;color:var(--text);background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015)),var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);min-height:154px}.card:hover{border-color:rgba(212,175,55,.68)}.card strong{display:block;color:var(--gold2);font-size:1.25rem;margin-bottom:8px}.card p{margin:0;color:var(--muted)}.badge{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:4px 9px;color:var(--muted);font-size:.8rem;margin-top:12px}.note{margin:18px 4px 0;color:var(--muted);font-size:.9rem}
</style></head><body><div class="app"><header><h1>なこ用ツール箱</h1><p class="lead">細かい文章作業を減らすための小道具置き場。公開安全版。初期データは入れず、設定は端末内だけに保存する。</p></header><main class="grid"><a class="card" href="./name-replacer.html"><strong>名前置換メーカー</strong><p>{NAME} を差し込んで、一人ずつへ渡す文章を生成する。</p><span class="badge">内向き依頼文</span></a><a class="card" href="./word-replacer.html"><strong>ワード変換メーカー</strong><p>投稿前に、内側の表記を外向き表記へ変換する。</p><span class="badge">外向き伏せ字</span></a></main><p class="note">PWA化すると、Androidのホーム画面から起動できる。オフラインでは、最後にキャッシュされたこのツール箱を開ける。</p></div></body></html>
